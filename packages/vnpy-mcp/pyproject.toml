[build-system]
requires = ["setuptools>=61"]
build-backend = "setuptools.build_meta"

[project]
name = "vnpy-mcp"
version = "0.1.0"
description = "VeighNa MCP 远端工具引擎"
requires-python = ">=3.10"
dependencies = [
    "vnpy>=4.0.0",
    "mcp>=1.0.0",
    "anyio>=4.12.1",
    "python-dotenv>=1.0.0",
    "vnpy-common",
]

[tool.setuptools.packages.find]
where = ["."]
include = ["vnpy_mcp*"]
