[build-system]
requires = ["setuptools>=61"]
build-backend = "setuptools.build_meta"

[project]
name = "vnpy-skills"
version = "0.1.0"
description = "VeighNa Agent Skill 引擎"
requires-python = ">=3.10"
dependencies = [
    "vnpy>=4.0.0",
    "python-dotenv>=1.0.0",
    "vnpy-common",
]

[tool.setuptools.packages.find]
where = ["."]
include = ["vnpy_skills*"]
