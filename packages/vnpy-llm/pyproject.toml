[build-system]
requires = ["setuptools>=61"]
build-backend = "setuptools.build_meta"

[project]
name = "vnpy-llm"
version = "0.1.0"
description = "VeighNa LLM 对话插件"
requires-python = ">=3.10"
dependencies = [
    "vnpy>=4.0.0",
    "openai>=1.0.0",
    "markdown>=3.5",
    "Pygments>=2.17",
    "python-dotenv>=1.0.0",
    "langgraph>=0.2",
    "langchain-openai>=0.2",
    "langchain-core>=0.3",
    "vnpy-common",
    "vnpy-skills",
    "vnpy-mcp",
    "langchain>=0.3",
]

[tool.setuptools.packages.find]
where = ["."]
include = ["vnpy_llm*"]

# mypy：见 docs/mypy-rollout.md
[tool.mypy]
python_version = "3.10"
files = ["vnpy_llm"]
mypy_path = "../vnpy-common:../vnpy-skills:../vnpy-mcp:."
follow_imports = "silent"
ignore_missing_imports = true
warn_return_any = true
warn_unused_ignores = true
no_implicit_optional = true
check_untyped_defs = true
disallow_untyped_defs = false
show_error_codes = true
