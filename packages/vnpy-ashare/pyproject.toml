[build-system]
requires = ["setuptools>=61"]
build-backend = "setuptools.build_meta"

[project]
name = "vnpy-ashare"
version = "0.1.0"
description = "VeighNa A 股现货终端：看盘、选股、回测"
readme = "vnpy_ashare/README.md"
requires-python = ">=3.10"
dependencies = [
    "vnpy>=4.0.0",
    "vnpy_ctastrategy>=1.3.0",
    "vnpy_ctabacktester>=1.3.0",
    "vnpy_datamanager>=1.2.0",
    "vnpy_sqlite>=1.1.0",
    "vnpy_tushare>=1.4.0",
    "vnpy-common",
    "vnpy-tickflow",
    "pandas>=2.0.0",
    "python-dotenv>=1.0.0",
    "redis>=5.0.0",
    "apscheduler>=3.10.0",
    "psycopg2-binary>=2.9.12",
    "vnpy_postgresql>=1.0.0",
]

[project.optional-dependencies]
llm = ["vnpy-llm"]
full = ["vnpy-llm"]

[tool.setuptools.packages.find]
where = ["."]
include = ["vnpy_ashare*"]
