[build-system]
requires = ["setuptools>=61"]
build-backend = "setuptools.build_meta"

[project]
name = "vnpy-ashare"
version = "0.1.0"
description = "VeighNa A 股现货终端：看盘、选股、回测"
readme = "vnpy_ashare/README.md"
requires-python = ">=3.10"
dependencies = [
    "vnpy>=4.0.0",
    "vnpy_ctastrategy>=1.3.0",
    "vnpy_ctabacktester>=1.3.0",
    "vnpy_datamanager>=1.2.0",
    "vnpy_sqlite>=1.1.0",
    "vnpy_tushare>=1.4.0",
    "vnpy-common",
    "vnpy-tickflow",
    "pandas>=2.0.0",
    "python-dotenv>=1.0.0",
    "redis>=5.0.0",
    "apscheduler>=3.10.0",
    "psycopg2-binary>=2.9.12",
    "vnpy_postgresql>=1.0.0",
]

[project.optional-dependencies]
llm = ["vnpy-llm"]
full = ["vnpy-llm"]

[project.scripts]
zak = "vnpy_ashare.cli:main"

[tool.setuptools.packages.find]
where = ["."]
include = ["vnpy_ashare*"]

# mypy 渐进启用：范围见仓库 docs/mypy-rollout.md
[tool.mypy]
python_version = "3.10"
files = [
    "vnpy_ashare/quotes/core",
    "vnpy_ashare/quotes/rank",
    "vnpy_ashare/quotes/market",
    "vnpy_ashare/quotes/misc",
    "vnpy_ashare/quotes/radar",
    "vnpy_ashare/screener",
    "vnpy_ashare/services",
    "vnpy_ashare/domain",
    "vnpy_ashare/config",
    "vnpy_ashare/storage",
    "vnpy_ashare/integrations",
    "vnpy_ashare/ai/context",
    "vnpy_ashare/data",
    "vnpy_ashare/jobs",
    "vnpy_ashare/ui",
]
mypy_path = "../vnpy-common:."
follow_imports = "silent"
ignore_missing_imports = true
warn_return_any = true
warn_unused_ignores = true
no_implicit_optional = true
check_untyped_defs = true
disallow_untyped_defs = false
show_error_codes = true

# Qt / vnpy UI：先放宽常见噪声规则，逐步收紧（见 docs/mypy-rollout.md Phase 7）
[[tool.mypy.overrides]]
module = "vnpy_ashare.ui.*"
disable_error_code = [
    "attr-defined",
    "override",
    "call-overload",
    "arg-type",
    "misc",
    "assignment",
    "union-attr",
    "no-any-return",
    "var-annotated",
    "name-defined",
    "operator",
    "has-type",
    "return-value",
    "no-redef",
]
