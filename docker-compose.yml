# PostgreSQL：元数据、K 线、Cache 共用
services:
  postgresql:
    image: postgres:16-alpine
    container_name: zak_postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: zak
      POSTGRES_DB: zak
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

volumes:
  postgres_data:
