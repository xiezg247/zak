# 仅 K 线数据使用 PostgreSQL，元数据（自选池/对话）始终为本地 SQLite
services:
  postgresql:
    image: postgres:16-alpine
    container_name: zak_postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: zak
      POSTGRES_DB: zak
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

volumes:
  postgres_data:
